apiVersion: v1
kind: Namespace
metadata:
  name: interviewai
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interviewai-ingress
  namespace: interviewai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - interviewai.in
        - api.interviewai.in
      secretName: interviewai-tls
  rules:
    - host: interviewai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.interviewai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 4000
