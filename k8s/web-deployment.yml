apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewai-web
  namespace: interviewai
  labels:
    app: interviewai
    tier: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: interviewai
      tier: web
  template:
    metadata:
      labels:
        app: interviewai
        tier: web
    spec:
      containers:
        - name: web
          image: ghcr.io/interviewai-india/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.interviewai.in/api/v1"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: interviewai
spec:
  selector:
    app: interviewai
    tier: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
