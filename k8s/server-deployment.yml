apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewai-server
  namespace: interviewai
  labels:
    app: interviewai
    tier: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: interviewai
      tier: server
  template:
    metadata:
      labels:
        app: interviewai
        tier: server
    spec:
      containers:
        - name: server
          image: ghcr.io/interviewai-india/server:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: jwt-refresh-secret
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: razorpay-key-id
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: razorpay-key-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: interviewai-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: interviewai
spec:
  selector:
    app: interviewai
    tier: server
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
